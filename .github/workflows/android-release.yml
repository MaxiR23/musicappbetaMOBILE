name: Android Release APK (cloud)

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_DEV_CLIENT: "1"   # por las dudas, desactiva dev client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Gradle permissions
        run: chmod +x android/gradlew

      - name: Create temp keystore (debug-style)
        working-directory: android
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build RELEASE APK (signed)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: beatly-beta-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
