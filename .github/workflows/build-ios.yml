name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --force

      - name: Create .env
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_STREAM_ENDPOINT=${{ secrets.EXPO_PUBLIC_STREAM_ENDPOINT }}" >> .env
          echo "EXPO_PUBLIC_STREAM_CLIENT_NAME=${{ secrets.EXPO_PUBLIC_STREAM_CLIENT_NAME }}" >> .env
          echo "EXPO_PUBLIC_STREAM_CLIENT_VERSION=${{ secrets.EXPO_PUBLIC_STREAM_CLIENT_VERSION }}" >> .env
          echo "EXPO_PUBLIC_OFFLINE_USER_1=${{ secrets.EXPO_PUBLIC_OFFLINE_USER_1 }}" >> .env
          echo "EXPO_PUBLIC_OFFLINE_USER_2=${{ secrets.EXPO_PUBLIC_OFFLINE_USER_2 }}" >> .env

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      # Patch SwiftAudioEx to fix duration x2 bug for fMP4 streams on iOS.
      # AVURLAsset.duration reports double the real duration for fMP4 progressive streams.
      # The HLS spec requires mvhd/tkhd duration = 0, so AVPlayer calculates it internally
      # and returns an incorrect value. Fix: divide raw duration by 2.
      # See: docs/ios-duration-fix.md
      - name: Patch SwiftAudioEx - fix duration x2 for fMP4 streams
        run: |
          TARGET=$(find ios/Pods -path "*SwiftAudioEx*" -name "AVPlayerWrapper.swift" | head -1)
          if [ -z "$TARGET" ]; then echo "ERROR: no encontrado"; exit 1; fi
          echo "=== Antes ==="
          sed -n '114,126p' "$TARGET"
          chmod u+w "$TARGET"
          python3 .github/scripts/patch_duration.py "$TARGET"
          echo "=== Despues ==="
          sed -n '114,123p' "$TARGET"

      - name: Build unsigned IPA
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(find ios -name "*.xcodeproj" -maxdepth 1 | head -1 | xargs -I{} basename {} .xcodeproj)
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== ERRORES ==="
            grep " error:" /tmp/build.log | grep -v "^note:" | grep -v "^warning:" || true
            exit $BUILD_EXIT
          fi
          mkdir -p $RUNNER_TEMP/payload/Payload
          cp -r "$RUNNER_TEMP/app.xcarchive/Products/Applications/"*.app "$RUNNER_TEMP/payload/Payload/"
          cd $RUNNER_TEMP/payload
          zip -r ../Beatly.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Beatly-iOS
          path: ${{ runner.temp }}/Beatly.ipa
          retention-days: 7