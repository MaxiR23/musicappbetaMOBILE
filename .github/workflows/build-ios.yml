name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --force

      - name: Create .env
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_STREAM_ENDPOINT=${{ secrets.EXPO_PUBLIC_STREAM_ENDPOINT }}" >> .env
          echo "EXPO_PUBLIC_STREAM_CLIENT_NAME=${{ secrets.EXPO_PUBLIC_STREAM_CLIENT_NAME }}" >> .env
          echo "EXPO_PUBLIC_STREAM_CLIENT_VERSION=${{ secrets.EXPO_PUBLIC_STREAM_CLIENT_VERSION }}" >> .env

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Patch SwiftAudioEx - precise duration for iOS streams
        run: |
          echo "=== Buscando AVPlayerWrapper.swift ==="
          TARGET=$(find ios/Pods -path "*SwiftAudioEx*" -name "AVPlayerWrapper.swift" | head -1)

          if [ -z "$TARGET" ]; then
            echo "ERROR: No se encontro AVPlayerWrapper.swift"
            find ios/Pods -path "*SwiftAudioEx*" -name "*.swift" | sort
            exit 1
          fi

          echo "Archivo: $TARGET"
          echo ""
          echo "=== Lineas con AVURLAsset ==="
          grep -n "AVURLAsset" "$TARGET"

          echo ""
          echo "=== Aplicando patch ==="

          if grep -q "AVURLAsset(url: url, options: options)" "$TARGET"; then
            sed -i '' 's/self\._pendingAsset = AVURLAsset(url: url, options: options)/var assetOptions = options ?? [String: Any]()\
            assetOptions[AVURLAssetPreferPreciseDurationAndTimingKey] = true\
            self._pendingAsset = AVURLAsset(url: url, options: assetOptions)/' "$TARGET"
            echo "Patch aplicado (patron 1: options existente)"

          elif grep -q "AVURLAsset(url: url)" "$TARGET"; then
            sed -i '' 's/AVURLAsset(url: url)/AVURLAsset(url: url, options: [AVURLAssetPreferPreciseDurationAndTimingKey: true])/' "$TARGET"
            echo "Patch aplicado (patron 2: sin options)"

          else
            echo "ERROR: No se encontro el patron esperado. Contenido relevante:"
            grep -n -B3 -A3 "AVURLAsset\|pendingAsset\|AVPlayerItem" "$TARGET"
            exit 1
          fi

          echo ""
          echo "=== Verificacion post-patch ==="
          grep -n "PreferPreciseDurationAndTimingKey\|AVURLAsset" "$TARGET"

      - name: Build unsigned IPA
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(find ios -name "*.xcodeproj" -maxdepth 1 | head -1 | xargs -I{} basename {} .xcodeproj)

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

          mkdir -p $RUNNER_TEMP/payload/Payload
          cp -r "$RUNNER_TEMP/app.xcarchive/Products/Applications/"*.app \
            "$RUNNER_TEMP/payload/Payload/"
          cd $RUNNER_TEMP/payload
          zip -r ../Beatly.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Beatly-iOS
          path: ${{ runner.temp }}/Beatly.ipa
          retention-days: 7